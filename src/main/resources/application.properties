spring.application.name=amadeus-parser

# 1. CONEXIÓN SQL SERVER 2008
# IMPORTANTE: Mantener encrypt=false y trustServerCertificate=true
spring.datasource.url=jdbc:sqlserver://SERVER10\\SQL2008;databaseName=bd_AgViajes;encrypt=false;trustServerCertificate=true;loginTimeout=30
spring.datasource.username=sa
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# 2. CONFIGURACIÓN HIBERNATE (SIN VALIDACIÓN DE ESQUEMA)
# 'none' evita que Hibernate busque tablas de sistema o secuencias inexistentes
spring.jpa.hibernate.ddl-auto=none
spring.jpa.generate-ddl=false
spring.jpa.show-sql=true

# 3. FORZAR COMPATIBILIDAD CON SQL 2008
# Evita el error 'INFORMATION_SCHEMA.SEQUENCES'
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.dialect.sql_server.version=2008
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# 4. ESTRATEGIA DE NOMBRES (MAREO EXACTO)
# Evita que 'AgencyName' se convierta en 'agency_name'
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# 5. AJUSTES DE CONEXIÓN (OPCIONAL)
spring.jpa.open-in-view=false